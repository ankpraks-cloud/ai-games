<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MiniCraft JS</title>
  <style>
    body { margin:0; overflow:hidden; background:#87ceeb; font-family:Arial, sans-serif; }
    #ui {
      position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,.45);
      padding:10px; border-radius:8px; font-size:14px; z-index:10;
    }
    #crosshair {
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      color:white; font-size:28px; z-index:10; pointer-events:none;
    }
    #hotbar {
      position:absolute; bottom:25px; left:50%; transform:translateX(-50%);
      display:flex; gap:6px; z-index:10;
    }
    .slot {
      width:54px; height:54px; border:2px solid #777; background:rgba(255,255,255,.25);
      color:white; display:flex; align-items:center; justify-content:center; flex-direction:column;
      font-size:11px;
    }
    .selected { border:3px solid gold; background:rgba(255,215,0,.35); }
    #inventory {
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      background:rgba(20,20,20,.9); color:white; padding:20px; border-radius:10px;
      display:none; z-index:20; width:420px;
    }
    #invgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .invitem { background:#444; padding:12px; border-radius:6px; text-align:center; }
    #death {
      position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);
      color:red; font-size:64px; display:none; z-index:30; text-align:center;
    }
  </style>
</head>
<body>
  <div id="ui">
    WASD Move | Mouse Look | Space Jump | R Break/Attack | E Place | C Chest | Tab Inventory<br>
    Health: <span id="health">10</span> | Hunger: <span id="hunger">10</span>
  </div>
  <div id="crosshair">+</div>
  <div id="hotbar"></div>
  <div id="inventory"><h2>Inventory</h2><div id="invgrid"></div></div>
  <div id="death">YOU DIED<br><span style="font-size:28px">Press R to respawn</span></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
